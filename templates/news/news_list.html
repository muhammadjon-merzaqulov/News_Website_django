<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News list</title>
</head>
<body>

    <a href="{% url 'home' %}"><h3>Home</h3></a>
    <a href="{% url 'category' %}"><h3>Category</h3></a>
    <a href="{% url 'contact' %}"><h3>Contact</h3></a>
    <h1>All News List</h1>
    {% for news in news_list %}
        <p><b>{{ news.category }}</b></p>
        <a href="{% url 'news_detail' news.pk %}">
            <li>{{ news.title }}</li>
        </a>
    {% endfor  %}
</body>
</html>
